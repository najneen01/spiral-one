<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral 1 | Independent Research Collective</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* Clean White Design */
        body { font-family: 'Inter', sans-serif; color: #333; background-color: #ffffff; }
        
        /* Dark Navy Headlines */
        h1, h2, h3, h4, h5, .navbar-brand { color: #0a192f; }
        
        .navbar { background-color: #ffffff; border-bottom: 1px solid #eee; padding: 15px 0; }
        .nav-link { color: #0a192f !important; font-weight: 500; }
        
        .hero-section { background-color: #ffffff; padding: 100px 0; }
        .hero-logo { width: 180px; height: auto; margin-bottom: 20px; }
        
        .section-title::after { content: ''; display: block; width: 50px; height: 3px; background: #00b4d8; margin-top: 10px; }
        
        /* Team Image Styling */
        .team-img { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; border: 3px solid #0a192f; margin-bottom: 20px; }
        
        .btn-submit { background-color: #0a192f; color: white; padding: 12px 30px; border-radius: 6px; border: none; }
        .btn-submit:hover { background-color: #00b4d8; }
        
        footer { background-color: #0a192f; color: #8892b0; padding: 40px 0; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">SPIRAL 1</a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#team">Team</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <img src="logo.png" alt="Spiral 1 Logo" class="hero-logo">
            
            <h1 class="display-4 fw-bold mb-3">Spiral 1</h1>
            <p class="lead text-muted mb-4">Independent Research Collective & Data Systems</p>
        </div>
    </header>

    <section id="team" class="py-5">
        <div class="container">
            <h2 class="section-title">Who We Are</h2>
            <div class="row">
                <div class="col-md-4">
                    <div class="card border-0 text-center p-4">
                        <img src="najneen-photo.jpg" alt="Najneen Rejwana" class="team-img mx-auto">
                        
                        <h5 class="fw-bold mb-1">Najneen Rejwana</h5>
                        <p class="text-muted small">Founding Principal Investigator</p>
                        <p class="small text-secondary">Specializing in structural biology and molecular modeling.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
