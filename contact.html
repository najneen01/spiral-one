<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | SPIRAL ONE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="container py-5 col-md-6">
        <h2 class="section-header">Contact Us</h2>
        <form action="https://formspree.io/f/YOUR_FORM_ID_HERE" method="POST">
            <input type="text" name="name" class="form-control mb-3" placeholder="Your Name" required>
            <input type="email" name="email" class="form-control mb-3" placeholder="Your Email" required>
            <textarea name="message" class="form-control mb-3" rows="5" placeholder="How can we help?"></textarea>
            <button type="submit" class="btn w-100" style="background:#006d77; color:white;">Send Message</button>
        </form>
    </section>

    <footer><p>&copy; 2026 SPIRAL ONE</p></footer>
</body>
</html>
