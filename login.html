<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Spiral 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <section class="container py-5 d-flex justify-content-center">
        <div class="card p-5 shadow-sm" style="width: 100%; max-width: 400px;">
            <h2 class="text-center mb-4" style="color: #0a192f;">Student Portal</h2>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="background-color: #0a192f;">Sign In</button>
            </form>
            <p class="text-center mt-3 text-secondary small">
                Access restricted to enrolled research mentees. <a href="contact.html">Request access here</a>.
            </p>
        </div>
    </section>

</body>
</html>
